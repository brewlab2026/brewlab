<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew Lab: Orchestrator Sandbox</title>
    <link rel="icon" type="image/png" href="brewlab_flavicon.png">
    <style>
        /* Universal width fix */
        * { box-sizing: border-box; }

        /* The Body: Edge-to-Edge with no gaps */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            width: 100%;
            overflow-x: hidden;
        }

        /* Matches the Viewer Header exactly */
        .header {
            width: 100%;
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        /* Hides the meta-row if there is no version/count text */
        #meta-container:empty { display: none; }

        /* Timer and Picker styles */
        .recipe-picker { background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; background: #1e1e1e; color: #fff; border-radius: 5px; font-size: 16px; border: 1px solid #444; }
        
        .timer-box { text-align: center; background: #000; padding: 30px; border: 2px solid #f1c40f; border-radius: 15px; display: none; }
        #timerDisplay { font-size: 5em; font-family: monospace; color: #f1c40f; margin: 10px 0; font-weight: bold; }
        
        /* Buttons */
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:active { opacity: 0.7; }

        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                <img src="brewlab_icon.png" alt="Logo" style="height: 32px; border-radius: 6px;">
                <h2 style="margin: 0; white-space: nowrap; font-size: 1.5em; color: #f1c40f;">Brew Lab</h2>
            </a>

            <div style="display: flex; align-items: center;">
                <span id="wakeLockBtn" onclick="toggleWakeLock()" 
                    style="cursor: pointer; font-size: 1.5em; filter: grayscale(1); transition: 0.3s; padding: 5px; user-select: none;">
                    💡
                </span>
            </div>
        </div>
        <div id="meta-container" style="width: 100%; text-align: left; font-size: 0.8em; color: #95a5a6; border-top: 1px solid #333; margin-top: 8px;"></div>
    </div>

    <div style="padding: 15px;">

        <div class="recipe-picker">
            <label style="color: #95a5a6; font-size: 0.9em; display: block; margin-bottom: 5px;">Select Recipe:</label>
            <select id="recipeSelect" onchange="loadRecipe()">
                <option value="">-- Choose a Recipe --</option>
            </select>
        </div>

        <div id="timerContainer" class="timer-box">
            <div id="currentStepLabel" style="font-size: 1.2em; color: #95a5a6; margin-bottom: 5px;">Ready</div>
            <div id="timerDisplay">00:00</div>
            <div id="nextStepLabel" style="font-size: 1.1em; color: #7f8c8d; margin-bottom: 20px; font-style: italic;">Next: --</div>
           
            <div style="border: 2px solid #f1c40f; border-radius: 10px; padding: 15px; margin: 10px 0; background: rgba(241, 196, 15, 0.05);">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button onclick="adjustTime(-60)" style="flex: 1; padding: 15px; background: #34495e; color: white; border-radius: 5px;">-1m</button>
                    <button onclick="adjustTime(60)" style="flex: 1; padding: 15px; background: #34495e; color: white; border-radius: 5px;">+1m</button>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button onclick="adjustTime(-10)" style="flex: 1; padding: 15px; background: #34495e; color: white; border-radius: 5px;">-10s</button>
                    <button onclick="adjustTime(10)" style="flex: 1; padding: 15px; background: #34495e; color: white; border-radius: 5px;">+10s</button>
                </div>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <input type="number" id="manualInput" placeholder="Min" 
                        style="flex: 1; width: 1%; min-width: 0; background: #1e1e1e; color: #f1c40f; border: 1px solid #444; border-radius: 5px; font-size: 1.2em; text-align: center; padding: 10px;">
                    <button onclick="setManualTime()" style="flex: 1; background: #2980b9; color: white; border-radius: 5px; padding: 10px;">SET TIME</button>
                </div>
            </div>

            <div id="alarm-overlay" style="display:none; margin-top: 15px;">
                <div style="color: #c0392b; font-weight: bold; margin-bottom: 10px; animation: blinker 1s linear infinite;">⚠️ STEP COMPLETE!</div>
                <button onclick="stopAlarm()" style="background: #c0392b; color: white; padding: 15px; width: 100%; border-radius: 5px;">SILENCE ALARM</button>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%;">
            <div style="display: flex; gap: 10px; width: 100%;">
                <button id="runBtn" onclick="toggleTimer()" style="flex: 1; padding: 15px; font-size: 1.1em; background: #27ae60; color: white; border-radius: 6px;">START MASH</button>
                <button onclick="resetTimer()" style="flex: 1; padding: 15px; font-size: 1.1em; background: #c0392b; color: white; border-radius: 6px;">RESET</button>
            </div>
            <button onclick="skipStep()" style="width: 100%; padding: 15px; background: #8e44ad; color: white; border-radius: 6px;">⏭ Skip to Next Step</button>
        </div>

        <div id="timeline-audit" style="margin-top: 30px; background: #1e1e1e; border-radius: 8px; padding: 15px; border: 1px solid #333;">
            <h3 style="margin-top:0; color: #f1c40f;">Brew Day Flight Plan</h3>
            <table id="audit-table" style="width:100%; border-collapse: collapse; font-size: 0.9em;">
                <thead>
                    <tr style="border-bottom: 2px solid #444; text-align: left; color: #95a5a6;">
                        <th style="padding: 8px;">Step</th>
                        <th style="padding: 8px;">Time</th>
                        <th style="padding: 8px;">Additions</th>
                    </tr>
                </thead>
                <tbody id="audit-body"></tbody>
            </table>
        </div>
    </div> <script src="mobile_recipes.js"></script>
    <script>
    /* YOUR JAVASCRIPT LOGIC REMAINS COMPLETELY UNTOUCHED BELOW */
    let timeline = [];
    let currentIdx = 0;
    let timeLeft = 0;
    let interval = null; 
    let timerActive = false;
    let alarmInterval; 

    window.playTone = function(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(type === 'warning' ? 440 : 880, ctx.currentTime);
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.02);
        const holdTime = (type === 'warning') ? 0.2 : 0.8;
        g.gain.setValueAtTime(0.2, ctx.currentTime + holdTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + holdTime + 0.2);
        o.connect(g);
        g.connect(ctx.destination);
        o.start();
        o.stop(ctx.currentTime + holdTime + 0.3);
    };

    window.onload = () => {
        const select = document.getElementById('recipeSelect');
        if(typeof recipeData !== 'undefined') {
            recipeData.forEach((r, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = r.display_name || r.name;
                select.appendChild(opt);
            });
        }
        document.getElementById('manualInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') setManualTime();
        });
    };

    function loadRecipe() {
        const idx = document.getElementById('recipeSelect').value;
        if (idx === "") return;
        const r = recipeData[idx];
        timeline = buildMasterTimeline(r); 
        currentIdx = 0; 
        if (timeline.length > 0) timeLeft = timeline[0].duration; 

        document.getElementById('timerContainer').style.display = 'block';
        const runBtn = document.getElementById('runBtn');
        runBtn.innerText = "START MASH";
        runBtn.style.background = "#27ae60";
        
        timerActive = false;
        if (interval) clearInterval(interval);
        
        updateUI(); 
        renderAuditTable(timeline);
    }

    function renderAuditTable(timelineData) {
        const body = document.getElementById('audit-body');
        body.innerHTML = ''; 
        timelineData.forEach((step, index) => {
            let additionsText = step.details || "";
            if (step.type === 'BOIL' && step.alerts) {
                additionsText = step.alerts
                    .map(a => `<div style="margin-bottom:4px;"><b>[${Math.floor(a.triggerAt/60)}m]</b> ${a.label}</div>`)
                    .join('');
            }
            const timeDisplay = step.isManual ? '<span style="color: #f1c40f;">Manual</span>' : (step.duration / 60) + ' min';
            let labelDisplay = step.label;
            if (step.temp_f) {
                labelDisplay += ` <span style="color: #f1c40f; font-weight: normal; font-size: 0.9em;">(${step.temp_f}°F)</span>`;
            }
            const isActive = (index === currentIdx);
            const row = `
                <tr style="border-bottom: 1px solid #333; ${isActive ? 'background: #2c3e50; border-left: 4px solid #f1c40f;' : ''}">
                    <td style="padding: 12px; font-weight: bold; color: #fff;">${labelDisplay}</td>
                    <td style="padding: 12px; white-space: nowrap;">${timeDisplay}</td>
                    <td style="padding: 12px; color: #bdc3c7; font-size: 0.85em; line-height: 1.4;">${additionsText}</td>
                </tr>
            `;
            body.innerHTML += row;
        });
    }

    function toggleTimer() {
        const btn = document.getElementById('runBtn');
        if (timerActive) {
            clearInterval(interval);
            btn.innerText = "RESUME";
            btn.style.background = "#2980b9";
        } else {
            if (timeLeft <= 0 && currentIdx < timeline.length - 1) {
                currentIdx++;
                timeLeft = timeline[currentIdx].duration || 0;
                renderAuditTable(timeline);
            }
            tick(); 
            interval = setInterval(tick, 1000);
            btn.innerText = "PAUSE";
            btn.style.background = "#e67e22";
        }
        timerActive = !timerActive;
        updateUI();
    }

    function tick() {
        if (timeLeft <= 0) {
            startContinuousAlarm();
            clearInterval(interval);
            timerActive = false;
            document.getElementById('runBtn').innerText = "START NEXT STEP";
            document.getElementById('runBtn').style.background = "#27ae60";
            return;
        }
        if (timeline[currentIdx].type === 'BOIL' && timeline[currentIdx].alerts) {
            timeline[currentIdx].alerts.forEach(alert => {
                if (timeLeft === alert.triggerAt) playTripleBeep();
            });
        }
        if (timeLeft === 120) playTripleBeep();
        timeLeft--;
        updateUI();
    }

    function updateUI() {
        let totalSeconds = Math.max(0, timeLeft);
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        const display = `${mins}:${secs.toString().padStart(2, '0')}`;
        if (document.getElementById('timerDisplay')) document.getElementById('timerDisplay').innerText = display;
        if (document.getElementById('currentStepLabel') && timeline[currentIdx]) {
            document.getElementById('currentStepLabel').innerText = timeline[currentIdx].label;
        }
        const elNext = document.getElementById('nextStepLabel');
        if (elNext) {
            elNext.innerText = (currentIdx < timeline.length - 1) ? "Next: " + timeline[currentIdx + 1].label : "Next: End of Brew Day";
        }
    }

    function playTripleBeep() {
        [0, 700, 1400].forEach(t => setTimeout(() => playTone('warning'), t));
    }

    function startContinuousAlarm() {
        document.getElementById('alarm-overlay').style.display = 'block';
        playTone('action');
        let count = 0;
        alarmInterval = setInterval(() => {
            playTone('action');
            if (++count >= 30) stopAlarm();
        }, 2000);
    }

    function stopAlarm() {
        clearInterval(alarmInterval);
        document.getElementById('alarm-overlay').style.display = 'none';
    }

    function adjustTime(seconds) {
        timeLeft = Math.max(0, timeLeft + seconds);
        updateUI();
    }

    function resetTimer() {
        if(confirm("Reset the entire Brew Day?")) {
            clearInterval(interval);
            loadRecipe();
        }
    }

    function setManualTime() {
        const input = document.getElementById('manualInput');
        const minutes = parseInt(input.value);
        if (!isNaN(minutes) && minutes >= 0) {
            timeLeft = minutes * 60;
            updateUI();
            input.value = '';
        }
    }

    function skipStep() {
        const currentLabel = timeline[currentIdx] ? timeline[currentIdx].label : "this step";
        if (!confirm(`Are you sure you want to skip ${currentLabel}?`)) return;
        clearInterval(interval);
        timerActive = false;
        timeLeft = 0;
        if (currentIdx < timeline.length - 1) {
            currentIdx++;
            timeLeft = timeline[currentIdx].duration || 0;
            document.getElementById('runBtn').innerText = "START NEXT STEP";
            document.getElementById('runBtn').style.background = "#27ae60";
        }
        updateUI();
        renderAuditTable(timeline);
    }

    function buildMasterTimeline(r) {
        let tl = [];
        if (r.mash_steps) {
            r.mash_steps.forEach(s => {
                const temp = s.temp_f || s.step_temp || s.temp || "--";
                tl.push({
                    type: 'MASH',
                    label: `MASH: ${s.step_label || 'Rest'}`,
                    duration: (parseInt(s.time_min) || 0) * 60,
                    temp_f: temp,
                    details: `${temp}${s.temp_unit || "°F"}`
                });
            });
        }
        tl.push({ type: 'TRANSITION', label: "HEATING TO BOIL", duration: 0, isManual: true });
        const boilItems = [...(r.hops || []).filter(h => (h.use || h.usage || "").toLowerCase() === 'boil'), ...(r.boil_additions || [])];
        tl.push({
            type: 'BOIL',
            label: "MAIN BOIL",
            duration: (parseInt(r.boil_time) || 60) * 60,
            alerts: boilItems.map(i => ({
                triggerAt: (parseInt(i.time || i.minutes) || 0) * 60,
                label: `ADD: ${i.amount || i.qty || ""}${i.unit || "oz"} ${i.name}`
            })).sort((a, b) => b.triggerAt - a.triggerAt)
        });
        tl.push({ type: 'TRANSITION', label: "RESUME WHEN BOIL COMPLETE", duration: 0, isManual: true });
        const postHops = (r.hops || []).filter(h => {
            const u = (h.use || h.usage || "").toLowerCase();
            return u.startsWith("flameout") || u.startsWith("whirlpool");
        });
        ["flameout", "whirlpool"].forEach(cat => {
            const items = postHops.filter(h => (h.use || h.usage || "").toLowerCase().startsWith(cat));
            if (items.length > 0) {
                const maxTime = Math.max(...items.map(h => parseInt(h.time) || 0));
                tl.push({
                    type: 'POST_BOIL',
                    label: (items[0].use || items[0].usage || cat).toUpperCase(),
                    duration: maxTime * 60,
                    isManual: maxTime === 0,
                    details: items.map(h => `Add ${h.amount}${h.unit || 'oz'} ${h.name}`).join('<br>')
                });
            }
        });
        return tl;
    }

    let wakeLock = null;
    async function toggleWakeLock() {
        const btn = document.getElementById('wakeLockBtn');
        if (wakeLock === null) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                btn.style.filter = "grayscale(0) drop-shadow(0 0 5px #f1c40f)";
            } catch (err) { console.error(`${err.name}, ${err.message}`); }
        } else {
            wakeLock.release();
            wakeLock = null;
            btn.style.filter = "grayscale(1)";
        }
    }    
    </script>
</body>
</html>
