<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brew Lab Mobile</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./brewlab_flavicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="brewlab_icon.png">
<style>
    body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; padding: 0; margin: 0; }
    
    /* Header with Gold Title */
    .header { 
        position: sticky; top: 0; background: #1f1f1f; padding: 15px; 
        border-bottom: 3px solid #f1c40f; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }
    /* Target the H2 specifically to make it gold */
    .header h2 { 
        color: #f1c40f; 
        margin: 0;
    }

    #searchBar { width: 95%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2d2d2d; color: white; font-size: 16px; margin-top: 10px; }
    .metadata-header { font-size: 0.8em; color: #95a5a6; }

    .recipe-card { background: #1e1e1e; padding: 15px; margin: 15px; border-radius: 8px; border: 1px solid #333; }
    .name { font-size: 1.4em; font-weight: bold; color: #f1c40f; }
    .style { color: #bdc3c7; font-style: italic; margin-bottom: 8px; }
    .vitals-row { display: flex; justify-content: space-between; font-weight: bold; background: #2d2d2d; padding: 10px; border-radius: 4px; font-size: 0.9em; }
    .swatch-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 0.85em; color: #bdc3c7; }
    .color-swatch { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #444; flex-shrink: 0; }
    
    /* Buttons - Removed Bright Blue */
    .details-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; }
    
    /* Level 2 & 3 Buttons now use the same Slate color */
    .btn-main, .btn-sub { background: #34495e; color: #fff; text-align: left; position: relative; }
    .btn-main::after, .btn-sub::after { content: '▶'; position: absolute; right: 15px; font-size: 0.8em; }

    .nested-section { background: #262626; padding: 12px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #444; }
    
    /* Section titles use gold for readability */
    .section-title { color: #f1c40f; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; }
    
    ul { padding-left: 20px; margin: 5px 0; }
    li { margin-bottom: 4px; }
    
    .notes-box { background: #000; padding: 10px; border: 1px solid #f1c40f; border-radius: 4px; color: #fff; white-space: pre-wrap; font-size: 0.9em; font-style: italic; margin-bottom: 10px; }
    .pre-wrap-block { white-space: pre-wrap; }

    .mash-table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-bottom: 10px; }
    .mash-table th { text-align: left; color: #95a5a6; border-bottom: 1px solid #444; padding: 4px; }
    .mash-table td { padding: 6px 4px; border-bottom: 1px solid #333; }

    /* Archive view */
    .archived-sub { color: #95a5a6; font-size: 0.8em; font-style: italic; margin-bottom: 8px; }
    .header-icon { color: #f1c40f; text-decoration: none; font-size: 1.5em; position: relative; }
    .archive-badge {
        position: absolute; top: -6px; right: -12px; background: #c0392b; color: #fff;
        font-size: 0.38em; line-height: 1; padding: 3px 5px; border-radius: 8px; font-weight: bold;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .view-badge {
        display: none; background: #95a5a6; color: #121212; font-size: 0.65em; font-weight: bold;
        text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle;
    }
</style>
</head>
<body onload="render()">

    <div class="header" style="padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
            
            <div class="header-logo" onclick="setView('active')" title="Return to Active Recipes">
                <img src="brewlab_icon.png" alt="Logo" style="height: 32px; border-radius: 6px;">
                <h2 id="headerTitle" style="margin: 0; white-space: nowrap; font-size: 1.5em;">Brew Lab<span id="viewBadge" class="view-badge">Archived</span></h2>
            </div>

            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="#" id="archiveToggleBtn" class="header-icon" title="View Archived Recipes" onclick="toggleArchiveView(); return false;">📦<span id="archiveBadge" class="archive-badge" style="display:none;"></span></a>
                <a href="brewlab_timer.html" title="Launch Timer" class="header-icon">⏱️</a>
                <a href="https://sites.google.com/view/homebrew-by-bill/brew-lab" target="_blank" title="View Documentation" class="header-icon">📖</a>
            </div>
        </div>

        <div id="meta-container" style="width: 100%; text-align: left; font-size: 0.8em; color: #95a5a6; margin-bottom: 15px; border-top: 1px solid #333; padding-top: 5px;">
            </div>

        <input type="text" id="searchBar" placeholder="Search recipes or styles..." onkeyup="render()" 
            style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2d2d2d; color: #fff; box-sizing: border-box;">
    </div>

    <div id="recipe-list"></div>
    
    <!-- No ?v= version string needed — sw.js handles mobile_recipes.js with
         a network-first strategy so it is always fetched fresh when online. -->
    <script src="mobile_recipes.js"></script>

    <script>
        // ── Service Worker Registration ────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.warn('Service worker registration failed:', err);
            });
        }

        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el) { el.style.display = el.style.display === 'none' || el.style.display === '' ? 'block' : 'none'; }
        }

        // ── Archive view state ───────────────────────────────────────────────
        let currentView = 'active'; // 'active' | 'archived'

        function isSet(v) { return v !== null && v !== undefined; }

        // Same 3-tier thresholds as the main app: ≤5% aligned, 5–75% leaning
        // (normal stylistic variation), 75%+ unusual enough to flag.
        function styleBalanceColor(bb) {
            const a = Math.abs(bb);
            if (a <= 5) { return '#2ecc71'; }
            if (a < 75) { return '#f39c12'; }
            return '#d64040';
        }

        function setView(view) {
            if (currentView === view) { return; }
            currentView = view;
            render();
        }

        function toggleArchiveView() {
            setView(currentView === 'archived' ? 'active' : 'archived');
        }

        // Reflects currentView in the header: title badge, search placeholder,
        // and whether the archive-entry icon is shown (hidden while already
        // viewing the archive — the way back is the Brew Lab logo, same pattern
        // as the timer's "tap the logo to go home" navigation).
        function updateHeaderForView() {
            const archiveBtn   = document.getElementById('archiveToggleBtn');
            const archiveBadge = document.getElementById('archiveBadge');
            const viewBadge    = document.getElementById('viewBadge');
            const searchBar    = document.getElementById('searchBar');

            const archivedCount = (typeof recipeData !== 'undefined')
                ? recipeData.filter(r => r.archived).length : 0;

            if (currentView === 'archived') {
                archiveBtn.style.display = 'none';
                viewBadge.style.display = 'inline-block';
                searchBar.placeholder = 'Search archived recipes...';
            } else {
                archiveBtn.style.display = archivedCount > 0 ? '' : 'none';
                archiveBadge.style.display = archivedCount > 0 ? 'inline-block' : 'none';
                archiveBadge.textContent = archivedCount;
                viewBadge.style.display = 'none';
                searchBar.placeholder = 'Search recipes or styles...';
            }
        }

        // Renders the "Calibration Overrides" block at the end of the Mash &
        // Process section — only fields this recipe actually overrides are
        // shown, same rule as the print view. 0 is a meaningful, set value
        // for the calibration factor (excludes post-boil hops entirely), so
        // it's checked with isSet(), never a truthy check.
        function renderCalibSection(r) {
            const hasCalib = isSet(r.recipe_mash_strike_ratio_default) || !!r.recipe_lid_state ||
                              !!r.recipe_chill_mode || isSet(r.recipe_post_boil_calibration_factor);
            if (!hasCalib) { return ''; }
            return `
                <div class="section-title" style="margin-top:14px;">Calibration Overrides</div>
                ${isSet(r.recipe_mash_strike_ratio_default) ? `<p><strong>Mash Strike Ratio:</strong> ${Number(r.recipe_mash_strike_ratio_default).toFixed(2)} qt/lb</p>` : ''}
                ${r.recipe_lid_state ? `<p><strong>Lid State:</strong> ${r.recipe_lid_state}</p>` : ''}
                ${r.recipe_chill_mode ? `<p><strong>Chill Mode:</strong> ${r.recipe_chill_mode}</p>` : ''}
                ${isSet(r.recipe_post_boil_calibration_factor) ? `<p><strong>Post-Boil IBU Calibration:</strong> ${Number(r.recipe_post_boil_calibration_factor).toFixed(2)}×</p>` : ''}
            `;
        }

        // Renders a "Label: value" row for free-text fields that may contain
        // Alt+T bullets. Plain text stays inline; if a bullet appears
        // anywhere in the value (not just at the start — a prose line
        // before the first bullet is common), the label drops to its own
        // line and the value renders in a pre-wrap block below it so
        // newlines and indentation survive, matching the print view.
        // `fallback`, if provided, keeps the row visible (e.g. "None") even
        // when the value is empty; omit it to hide the row entirely instead.
        function renderTextField(label, value, fallback) {
            if (!value) {
                return fallback !== undefined ? `<p><strong>${label}:</strong> ${fallback}</p>` : '';
            }
            if (value.includes('\u2022')) {
                return `<p><strong>${label}:</strong></p><div class="pre-wrap-block" style="margin:2px 0 8px;">${value}</div>`;
            }
            return `<p><strong>${label}:</strong> ${value}</p>`;
        }

        // Format a gravity value (OG/FG) to 3dp, showing '—' if null/zero/invalid
        function fmtGravity(val) {
            const n = parseFloat(val);
            return (!val || isNaN(n) || n === 0) ? '—' : n.toFixed(3);
        }

        // Format ABV to 1dp, showing '—' if null/invalid
        function fmtAbv(val) {
            const n = parseFloat(val);
            return (!val || isNaN(n) || n === 0) ? '—' : n.toFixed(1) + '%';
        }

        function render() {
            const list = document.getElementById('recipe-list');
            const metaContainer = document.getElementById('meta-container');
            
            try {
                const term = document.getElementById('searchBar').value.toLowerCase();
                
                if (typeof exportMeta !== 'undefined') {
                    const onlineStatus = navigator.onLine
                        ? '<span style="color:#2ecc71;">● Online</span>'
                        : '<span style="color:#e67e22;">● Offline — showing cached data</span>';
                    metaContainer.innerHTML = `<div class="metadata-header">Exported: ${exportMeta.export_datetime} · App v${exportMeta.app_version} · ${onlineStatus}</div>`;
                }

                // Update online/offline indicator live if connection changes
                window.addEventListener('online',  () => render());
                window.addEventListener('offline', () => render());

                if (typeof recipeData === 'undefined') {
                    list.innerHTML = "<div class='recipe-card'>No data found.</div>";
                    return;
                }

                updateHeaderForView();

                const filtered = recipeData.filter(r =>
                    (currentView === 'archived' ? !!r.archived : !r.archived) &&
                    ((r.display_name || r.name || "").toLowerCase().includes(term) ||
                     (r.style || "").toLowerCase().includes(term))
                );

                if (filtered.length === 0) {
                    const emptyMsg = currentView === 'archived'
                        ? 'No archived recipes.'
                        : (term ? `No recipes match "${term}".` : 'No recipes yet.');
                    list.innerHTML = `<div class="recipe-card" style="text-align:center; color:#95a5a6;">${emptyMsg}</div>`;
                    return;
                }

                list.innerHTML = filtered.map(r => `
                    <div class="recipe-card">
                        <div class="name">${r.display_name || r.name}</div>
                        <div class="style">${r.style || "Unknown Style"}</div>
                        ${r.archived ? `<div class="archived-sub">📦 Archived ${r.archived_date || ''}${r.archived_reason ? ' — ' + r.archived_reason : ''}</div>` : ''}
                        <div class="vitals-row">
                            <span>OG: ${fmtGravity(r.og)}</span><span>FG: ${fmtGravity(r.fg)}</span><span>ABV: ${r.abv}%</span><span>IBU: ${r.ibu}</span><span>SRM: ${r.srm}</span>
                        </div>
                        <div class="swatch-row">
                            <div class="color-swatch" style="background-color: ${r.srm_hex};"></div>
                            ${isSet(r.bitterness_balance) ? `<span>Style Balance: <strong style="color:${styleBalanceColor(r.bitterness_balance)}">${r.bitterness_balance > 0 ? '+' : ''}${r.bitterness_balance}%</strong> — ${r.bitterness_label || ''}</span>` : ''}
                        </div>
                        
                        <button class="details-btn btn-main" onclick="toggleDetails('details-${r.recipe_id}')">▼ View Recipe Details</button>
                        
                        <div id="details-${r.recipe_id}" style="display:none; margin-top:15px;">
                            
                            <button class="details-btn btn-sub" onclick="toggleDetails('recipe-${r.recipe_id}')">Ingredients</button>
                            <div id="recipe-${r.recipe_id}" style="display:none;" class="nested-section">
                                <div class="section-title">Grains</div>
                                <ul>${(r.grains || []).map(g => `
                                    <li><strong>${g.amount} ${g.unit}</strong> ${g.name} (${g.pct_of_grist}%) <br>
                                    <span style="font-size:0.85em; color:#95a5a6;">Color: ${g.lovibond} L</span></li>
                                `).join('')}</ul>

                                <div class="section-title">Hops</div>
                                <ul>${(r.hops || []).map(h => `
                                    <li><strong>${h.amount} ${h.unit}</strong> ${h.name} @ ${h.time} ${h.time_unit} (${h.usage})<br>
                                    <span style="font-size:0.85em; color:#95a5a6;">AA: ${(h.alpha_acid * 100).toFixed(1)}% | ${h.hop_form}</span></li>
                                `).join('')}</ul>

                                <div class="section-title">Boil Additions</div>
                                <ul>${(r.boil_additions || []).map(b => `<li><strong>${b.amount} ${b.unit}</strong> ${b.name} @ ${b.time} ${b.time_unit}</li>`).join('')}</ul>

                                <div class="section-title">Yeast</div>
                                <ul>${(r.yeast || []).map(y => `
                                    <li><strong>${y.amount || ''} ${y.unit || ''}</strong> ${y.name} (Atten: ${y.attenuation}%)</li>
                                `).join('')}</ul>
                            </div>

                            <button class="details-btn btn-sub" onclick="toggleDetails('mash-${r.recipe_id}')">Mash & Process</button>
                            <div id="mash-${r.recipe_id}" style="display:none;" class="nested-section">
                                <p><strong>Batch:</strong> ${r.batch_size} ${r.batch_size_unit} | <strong>Type:</strong> ${r.mash_type} | <strong>Method:</strong> ${r.strike_vol_method} | <strong>Eff:</strong> ${r.is_extract ? '0%' : r.efficiency + '%'}</p>
                                ${r.total_grain_lbs ? `<p><strong>Total Grain:</strong> ${r.total_grain_lbs} ${r.total_grain_unit || 'lbs'}</p>` : ''}
                                ${renderTextField('Water Treatments', r.water_treatments, 'None')}
                                <p><strong>Camden ${r.is_extract ? 'Steep' : 'Strike'}:</strong> ${r.camden_mash_tablets} tabs / ${r.camden_mash_grams}g</p>
                                <p><strong>Camden ${r.is_extract ? 'Kettle Water' : 'Sparge'}:</strong> ${r.camden_sparge_tablets} tabs / ${r.camden_sparge_grams}g</p>

                                <div class="section-title">${r.is_extract ? 'Steep' : 'Mash'} Table</div>
                                <table class="mash-table">
                                    <thead><tr><th>Step</th><th>Temp</th><th>Time</th><th>Adj</th></tr></thead>
                                    <tbody>
                                        ${(r.mash_steps || []).map((m, idx) => `
                                            <tr><td>${m.step_label}</td><td>${m.temp_f}°F</td><td>${m.time_min} min</td><td>${m.adjustment_gal} gal</td></tr>
                                            ${idx > 0 && m.adj_temp_f !== null && m.adj_temp_f !== undefined && parseFloat(m.adjustment_gal) > 0 ? `
                                            <tr><td colspan="4" style="padding: 2px 4px 6px 16px; color: ${m.adj_temp_over_boiling ? '#f1c40f' : '#95a5a6'}; font-size: 0.85em;">
                                                ↳ Adj Temp: ${m.adj_temp_f}°F${m.adj_temp_over_boiling ? ' ⚠' : ''}
                                            </td></tr>` : ''}
                                        `).join('')}
                                    </tbody>
                                </table>

                                <p><strong>${r.is_extract ? 'Steep' : 'Strike'}:</strong> ${r.strike_temp}°F / ${r.strike_volume} ${r.strike_volume_unit}</p>
                                ${r.is_extract ? `<p><strong>Kettle Target Vol:</strong> ${r.kettle_target_vol} gal</p><p><strong>Kettle Water:</strong> ${r.kettle_water} gal</p>` : `<p><strong>Sparge:</strong> ${r.sparge_temp}°F / ${r.sparge_amount} ${r.sparge_amount_unit}</p>`}
                                <p><strong>Boil Time:</strong> ${r.boil_time} ${r.boil_time_unit}</p>
                                <p><strong>Fermentation:</strong> ${r.fermentation_temp}°F | <strong>Carb:</strong> ${r.carbonation} vol</p>
                                ${renderTextField('Ferm. Schedule', r.fermentation_schedule)}
                                ${renderTextField('Carb. Method', r.carbonation_method)}
                                ${renderCalibSection(r)}
                            </div>

                            <button class="details-btn btn-sub" onclick="toggleDetails('notes-${r.recipe_id}')">Notes</button>
                            <div id="notes-${r.recipe_id}" style="display:none;" class="nested-section">
                                <p><strong>Date:</strong> ${r.notes_date || 'N/A'}</p>
                                <div class="section-title">${r.notes_label_1 || 'Note 1'}</div>
                                <div class="notes-box">${r.notes_1 || 'No notes available.'}</div>
                                <div class="section-title">${r.notes_label_2 || 'Note 2'}</div>
                                <div class="notes-box">${r.notes_2 || ''}</div>
                            </div>

                            <button class="details-btn btn-sub" onclick="toggleDetails('log-${r.recipe_id}')">Session Logs</button>
                            <div id="log-${r.recipe_id}" style="display:none;" class="nested-section">
                                ${(r.sessions || []).map(s => `
                                    <button class="details-btn" style="background:#111; color:#3498db; border:1px solid #333; margin-bottom:5px; text-align:left;" onclick="toggleDetails('sess-${s.session_id}')">
                                        Session: ${s.session_date || 'New session'}
                                    </button>
                                    <div id="sess-${s.session_id}" style="display:none; padding:10px; background:#000; border:1px solid #444; border-radius:4px; font-size:0.9em; margin-bottom:10px;">
                                        <p><strong>Actual OG:</strong> ${fmtGravity(s.actual_og)} | <strong>FG:</strong> ${fmtGravity(s.actual_fg)} | <strong>ABV:</strong> ${fmtAbv(s.actual_abv)}</p>
                                        <p><strong>Efficiency:</strong> ${isSet(s.mash_efficiency) ? s.mash_efficiency + '%' : '—'} | <strong>Atten:</strong> ${isSet(s.apparent_attenuation) ? s.apparent_attenuation + (s.apparent_attenuation_unit || '%') : '—'}</p>
                                        <p><strong>Calories (12oz):</strong> ${isSet(s.calories_12oz) ? s.calories_12oz : '—'} | <strong>Carbs (12oz):</strong> ${isSet(s.carbs_12oz) ? s.carbs_12oz + (s.carbs_12oz_unit || 'g') : '—'}</p>
                                        <p><strong>Observed Color:</strong> ${s.observed_color || 'N/A'}</p>
                                        
                                        ${s.aged_hops && s.aged_hops.length > 0 ? `
                                            <div style="margin: 10px 0;">
                                                <button class="details-btn" 
                                                        style="background:#222; color:#f1c40f; border:1px solid #444; padding: 5px 10px; font-size: 0.85em; width: auto;" 
                                                        onclick="toggleDetails('aged-hops-${s.session_id}')">
                                                    View Aged Hop Adjustments ▾
                                                </button>
                                                <div id="aged-hops-${s.session_id}" style="display:none; margin-top: 5px; background: #111; padding: 10px; border-radius: 4px; border: 1px solid #333;">
                                                    <div style="font-size: 0.8em; color: #95a5a6; margin-bottom: 8px; font-style: italic;">
                                                        Adjustments based on ${s.brew_date_dt || 'recorded'} brew date
                                                    </div>
                                                    ${s.aged_hops.map(h => `
                                                        <div style="margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px;">
                                                            <div style="font-size: 0.95em; color: #e0e0e0;">
                                                                <strong>${h.amount} ${h.unit}</strong> ${h.name} @ ${h.time} ${h.time_unit} (${h.usage})
                                                            </div>
                                                            <div style="font-size: 0.8em; color: #95a5a6; margin-top: 2px;">
                                                                Adjusted: <span style="color: #f1c40f;">${h.adjusted_amount} ${h.unit}</span> | 
                                                                Age: ${h.age_years} yrs | 
                                                                Status: <span style="text-transform: capitalize;">${h.status.replace(/_/g, ' ')}</span>
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        ` : ''}

                                        ${(s.brew_day_notes || s.tasting_notes) ? `
                                            <div style="margin: 10px 0;">
                                                <button class="details-btn" 
                                                        style="background:#222; color:#f1c40f; border:1px solid #444; padding: 5px 10px; font-size: 0.85em; width: auto;" 
                                                        onclick="toggleDetails('sess-notes-${s.session_id}')">
                                                    View Session Notes ▾
                                                </button>
                                                <div id="sess-notes-${s.session_id}" style="display:none; margin-top: 5px; background: #111; padding: 10px; border-radius: 4px; border: 1px solid #333;">
                                                    <div class="section-title">Brew Day Notes</div>
                                                    <div class="pre-wrap-block" style="margin-bottom:10px;">${s.brew_day_notes || 'N/A'}</div>
                                                    <div class="section-title">Tasting Notes</div>
                                                    <div class="pre-wrap-block">${s.tasting_notes || 'N/A'}</div>
                                                </div>
                                            </div>
                                        ` : ''}
                                    </div>
                                `).join(r.sessions.length === 0 ? 'No sessions recorded.' : '')}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = "<div style='color:red; padding:15px;'>Render Error: " + err.message + "</div>";
            }
        }    
    </script>
    
</body>
</html>
