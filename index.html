<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brew Lab Mobile</title>
    
    <link rel="apple-touch-icon" href="brewlab_icon.png?v=3">
    <link rel="icon" type="image/png" href="brewlab_icon.png?v=3">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">

    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 15px; margin: 0; }
        /* Fixed the 'sticky' header syntax here */
        .header { position: sticky; top: 0; background: #1a1a1a; padding-bottom: 10px; border-bottom: 1px solid #333; z-index: 100; }
        #searchBar { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2d2d2d; color: white; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        .recipe-card { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #f39c12; }
        .name { font-size: 1.2em; font-weight: bold; color: #f39c12; }
        .style { color: #bdc3c7; font-size: 0.9em; margin-bottom: 8px; }
        .details-btn { background: #444; color: #eee; border: none; padding: 8px; width: 100%; text-align: left; border-radius: 4px; cursor: pointer; margin-top: 10px; font-size: 0.9em; }
        .ingredients { display: none; padding: 10px; background: #1e1e1e; margin-top: 5px; border-radius: 4px; font-size: 0.9em; color: #ccc; }
        .ingredients ul { margin: 5px 0; padding-left: 20px; }
    </style>
</head>
<body onload="render()">
    <div class="header">
        <h2 style="margin: 5px 0;">Brew Lab Mobile</h2>
        <input type="text" id="searchBar" placeholder="Search recipes or styles..." onkeyup="render()">
    </div>

    <div id="recipe-list">Loading recipes...</div>

<script src="mobile_recipes.js?v=1774583543"></script>

    <script>
        function toggleDetails(id) {
            const el = document.getElementById('details-' + id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function render() {
            const list = document.getElementById('recipe-list');
            const term = document.getElementById('searchBar').value.toLowerCase();
            
            if (typeof recipeData === 'undefined') {
                list.innerHTML = "No data found. Run export script.";
                return;
            }

            const filtered = recipeData.filter(r => 
                r.display_name.toLowerCase().includes(term) || 
                (r.style_name && r.style_name.toLowerCase().includes(term))
            );

            list.innerHTML = filtered.map(r => `
                <div class="recipe-card">
                    <div class="name">${r.display_name}</div>
                    <div class="style">${r.style_name || 'No Style'}</div>
                    <button class="details-btn" onclick="toggleDetails(${r.id})">▼ View Grains & Hops</button>
                    <div id="details-${r.id}" class="ingredients">
                        <strong>Grains:</strong>
                        <ul>${(r.grains || []).map(g => `<li>${g}</li>`).join('')}</ul>
                        <strong>Hops:</strong>
                        <ul>${(r.hops || []).map(h => `<li>${h}</li>`).join('')}</ul>
                    </div>
                </div>
            `).join('');
        }
    </script>

 <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Check if there is already a waiting update
      if (reg.waiting) {
        console.log("New version found, updating...");
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      reg.onupdatefound = () => {
        const newWorker = reg.installing;
        newWorker.onstatechange = () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Instead of reloading automatically (which causes the flash), 
            // we just tell the user or wait for the next manual refresh.
            console.log("New content available. Please refresh.");
          }
        };
      };
    });
  }
</script>
</body>
</html>
